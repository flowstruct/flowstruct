[tools]
java = "21"
node = "24"
"npm:google-java-format" = "latest"
pnpm = "10"
maven = "3"

[env]
SPRING_PROFILES_ACTIVE = "dev"
NODE_ENV = "dev"

[tasks."deps:client"]
run = "cd client && pnpm install"

[tasks."deps:api"]
run = "cd api && mvn dependency:resolve"

[tasks.deps]
depends = ["deps:*"]

[tasks.db]
run = "cd api && docker compose up"

[tasks."db:down"]
run = "cd api && docker compose down -v"

[tasks.api]
run = "cd api && mvn spring-boot:run"

[tasks.client]
run = "cd client && pnpm start:cms"
