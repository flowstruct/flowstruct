spring:
  application:
    name: flowstruct-api
  datasource:
    url: jdbc:postgresql://database/${DB_NAME:flowstruct}
    username: ${DB_USER:flowstruct}
    password: ${DB_PASSWORD:flowstruct}
  flyway:
    clean-disabled: true
    baseline-on-migrate: true
    baseline-description: "init"
    baseline-version: 0
    user: ${DB_USER:flowstruct}
    password: ${DB_PASSWORD:flowstruct}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health

jwt:
  cookie:
    expiry: 1800

web:
  resources:
    cache:
      cachecontrol:
        max-age: 31536000s
        public: true
        must-revalidate: true
        no-transform: true

server:
  forward-headers-strategy: native

secure: true

api:
  key: ${API_KEY:super-secret-api-key}

site-generator:
  dir: ${SITE_GENERATOR_DIR}
